<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLD CLINIC — Price List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{
  --cream:#f7f4ef;--warm-white:#faf8f5;--tan:#c9bfad;--tan-light:#e8e2d9;
  --text-dark:#2c2620;--text-mid:#6b5e52;--text-light:#a89e94;
  --gold:#b8a888;--gold-dark:#8c7d67;--border:#ddd7ce;
  --admin-accent:#5a6e5a;--event-bg:#f2ede4;--event-border:#c9bfad;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;font-size:16px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--warm-white);border:1px solid var(--border);border-radius:2px;padding:3rem 2.5rem;width:100%;max-width:360px;text-align:center;}
.login-logo-img{width:160px;height:auto;margin-bottom:.5rem;}
.login-divider{border:none;border-top:1px solid var(--border);margin:2rem 0;}
.login-label{font-size:12px;letter-spacing:2px;color:var(--text-mid);display:block;text-align:left;margin-bottom:8px;}
.login-input{width:100%;border:1px solid var(--border);background:var(--cream);padding:11px 14px;font-size:15px;font-family:inherit;color:var(--text-dark);outline:none;border-radius:1px;transition:border-color .2s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;margin-top:1.5rem;background:var(--text-dark);color:var(--warm-white);border:none;padding:13px;font-size:13px;letter-spacing:3px;cursor:pointer;font-family:inherit;}
.login-error{font-size:13px;color:#c0392b;margin-top:.75rem;display:none;}
.login-hint{font-size:12px;color:var(--text-light);margin-top:1rem;}

/* ADMIN NAV */
#admin-nav{background:var(--text-dark);color:var(--warm-white);display:flex;align-items:center;justify-content:space-between;padding:10px 1.5rem;font-size:12px;letter-spacing:1px;flex-wrap:wrap;gap:8px;}
.nav-mode-btns{display:flex;gap:6px;}
.nav-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--warm-white);padding:5px 12px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:inherit;}
.nav-btn.active,.nav-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.6);}
.nav-right{display:flex;gap:8px;align-items:center;}
.logout-btn{background:transparent;border:none;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;font-family:inherit;}
.save-btn-nav{background:var(--admin-accent);border:none;color:white;padding:6px 14px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:inherit;}

/* SITE HEADER */
.site-header{text-align:center;padding:2.5rem 1.5rem 1.5rem;border-bottom:1px solid var(--border);}
.site-header img{width:180px;height:auto;margin-bottom:.5rem;}
.price-list-script{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:42px;font-weight:300;color:var(--gold-dark);margin:.75rem 0 .5rem;}
.tax-note{font-size:14px;color:var(--text-light);}

/* L1 TABS */
.l1-tabs{display:flex;padding:10px 12px;gap:8px;border-bottom:1px solid var(--border);background:var(--warm-white);position:sticky;top:0;z-index:100;}
.l1-tab{flex:1;padding:10px 6px;text-align:center;font-size:14px;letter-spacing:.5px;color:var(--text-mid);cursor:pointer;border-radius:20px;border:1px solid var(--border);transition:all .2s;background:var(--cream);font-family:inherit;}
.l1-tab.active{color:var(--warm-white);background:var(--text-dark);border-color:var(--text-dark);font-weight:500;}

/* L2 TABS (price list subcategories) */
.l2-tabs{display:flex;overflow-x:auto;gap:0;background:var(--cream);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.l2-tabs::-webkit-scrollbar{display:none;}
.l2-tab{white-space:nowrap;padding:11px 18px;font-size:13px;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;letter-spacing:.5px;}
.l2-tab.active{color:var(--gold-dark);border-bottom:2px solid var(--gold-dark);}

/* MAIN WRAP */
.main-wrap{max-width:720px;margin:0 auto;padding:0 1.25rem 5rem;}

/* PANELS */
.l1-panel{display:none;}
.l1-panel.active{display:block;}
.l2-panel{display:none;}
.l2-panel.active{display:block;}

/* SECTION */
.section-block{margin-top:2rem;}
.block-header{font-size:16px;font-weight:400;letter-spacing:2px;color:var(--text-dark);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}

/* EVENT ZONE */
.event-zone{padding:0;}

/* PRICE ITEMS */
.price-item{margin-bottom:1.75rem;}
.item-name{font-size:16px;font-weight:400;color:var(--text-dark);margin-bottom:4px;line-height:1.5;}
.item-note{font-size:13px;color:var(--text-light);margin-bottom:4px;line-height:1.5;}
.item-tag{display:inline-block;font-size:11px;letter-spacing:2px;background:var(--text-dark);color:var(--warm-white);padding:3px 10px;margin-bottom:6px;border-radius:1px;}
.item-rows{display:flex;flex-direction:column;gap:0;}
.item-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dotted var(--tan-light);}
.item-row:last-child{border-bottom:none;}
.row-label{font-size:14px;color:var(--text-mid);flex:1;}
.row-spec{font-size:13px;color:var(--text-light);min-width:70px;text-align:right;margin-right:1rem;}
.row-price{font-size:17px;font-weight:500;color:var(--text-dark);min-width:80px;text-align:right;}
.row-unit{font-size:12px;color:var(--text-light);margin-left:2px;}
.updated-note{font-size:12px;color:var(--text-light);text-align:center;margin-top:3rem;}

/* FIRST VISIT / EVENT panels */
.special-header{font-size:13px;letter-spacing:3px;color:var(--gold-dark);padding:1.5rem 0 .75rem;border-bottom:1px solid var(--event-border);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;}
.special-badge{font-size:10px;letter-spacing:2px;border:1px solid var(--gold);color:var(--gold-dark);padding:2px 8px;}

/* ADMIN EDIT */
#edit-view{display:none;}
.admin-section{margin-top:1.5rem;}
.admin-cat-header{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.admin-cat-name{flex:1;font-size:14px;letter-spacing:1px;border:none;border-bottom:1px solid var(--border);background:transparent;padding:4px 0;font-family:inherit;color:var(--text-dark);outline:none;}
.admin-cat-name:focus{border-color:var(--gold);}
.del-cat-btn,.del-item-btn,.del-row-btn{background:none;border:none;cursor:pointer;color:var(--text-light);font-size:16px;line-height:1;}
.del-cat-btn:hover,.del-item-btn:hover,.del-row-btn:hover{color:#c0392b;}
.admin-item{background:var(--warm-white);border:1px solid var(--border);border-radius:2px;padding:1rem;margin-bottom:.75rem;}
.admin-item-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.admin-item-name{flex:1;font-size:14px;border:none;border-bottom:1px solid var(--border);background:transparent;padding:4px 2px;font-family:inherit;color:var(--text-dark);outline:none;}
.admin-small-input{width:100%;font-size:13px;border:none;border-bottom:1px dashed var(--border);background:transparent;padding:3px 2px;font-family:inherit;color:var(--text-mid);outline:none;margin-bottom:6px;}
.admin-tag-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.admin-tag-input{font-size:11px;border:1px solid var(--border);background:var(--cream);padding:3px 8px;font-family:inherit;color:var(--text-mid);outline:none;border-radius:1px;}
.admin-tag-label{font-size:11px;color:var(--text-light);}
.admin-price-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.admin-price-row{display:flex;gap:6px;align-items:center;}
.admin-price-input{border:1px solid var(--border);background:var(--cream);padding:5px 8px;font-size:13px;font-family:inherit;color:var(--text-dark);outline:none;border-radius:1px;}
.inp-label{flex:1.5;}.inp-spec{flex:1;}.inp-price{flex:1;}.inp-unit{width:56px;}
.add-row-btn{font-size:12px;color:var(--admin-accent);background:none;border:none;cursor:pointer;padding:4px 0;}
.add-item-btn{width:100%;padding:10px;background:transparent;border:1px dashed var(--border);font-size:13px;letter-spacing:1px;color:var(--text-light);cursor:pointer;font-family:inherit;margin-bottom:.5rem;}
.add-item-btn:hover{border-color:var(--gold);color:var(--gold-dark);}
.add-cat-btn{width:100%;margin-top:1rem;padding:12px;background:transparent;border:1px solid var(--border);font-size:12px;letter-spacing:2px;color:var(--text-mid);cursor:pointer;font-family:inherit;}
.col-headers{display:flex;gap:6px;font-size:10px;letter-spacing:1px;color:var(--text-light);margin-bottom:4px;}
.col-headers span:nth-child(1){flex:1.5;}
.col-headers span:nth-child(2){flex:1;}
.col-headers span:nth-child(3){flex:1;}
.col-headers span:nth-child(4){width:56px;}
.admin-l2-label{font-size:11px;color:var(--gold-dark);background:var(--event-bg);border:1px solid var(--event-border);padding:2px 8px;margin-left:6px;letter-spacing:1px;}
.cat-type-sel{font-size:11px;border:1px solid var(--border);background:var(--cream);padding:3px 6px;font-family:inherit;color:var(--text-mid);outline:none;}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--admin-accent);color:white;padding:10px 24px;font-size:13px;letter-spacing:2px;opacity:0;transition:opacity .3s;pointer-events:none;border-radius:1px;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:480px){
  .price-list-script{font-size:38px;}
  .l1-tab{font-size:13px;padding:12px 6px;}
  .l2-tab{font-size:12px;padding:10px 14px;}
  .item-name{font-size:15px;}
  .row-price{font-size:16px;}
  .row-label{font-size:13px;}
  .block-header{font-size:15px;}
  .main-wrap{padding:0 1rem 5rem;}
}

/* BANNER CAROUSEL */
.banner-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.7);border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;color:var(--text-dark);backdrop-filter:blur(4px);}
.banner-arrow-left{left:10px;}
.banner-arrow-right{right:10px;}
.banner-arrow:active{background:rgba(255,255,255,0.95);}
.banner-wrap{position:relative;width:100%;overflow:hidden;background:#000;max-height:70vw;}
.banner-track{display:flex;transition:transform .5s ease;height:100%;}
.banner-slide{min-width:100%;position:relative;}
.banner-slide img{width:100%;display:block;object-fit:cover;}
.banner-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 4px;background:var(--cream);}
.banner-dot{width:6px;height:6px;border-radius:50%;background:var(--tan);cursor:pointer;transition:all .2s;}
.banner-dot.active{background:var(--text-dark);width:18px;border-radius:3px;}
</style>
</head>

let data=loadData();
let isAdmin=false;

function loadData(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData(){
  data.updatedAt=new Date().toLocaleDateString('zh-CN');
  collectEditValues();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  renderAll();showToast();
}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showAdminLogin(){
  document.getElementById('public-only').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-entry-btn').style.display='none';
}
function doLogin(){
  const pw = document.getElementById('pw-input').value.trim();
  if(pw===ADMIN_PASSWORD){
    isAdmin=true;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('public-only').style.display='none';
    document.getElementById('admin-nav').style.display='flex';
    document.getElementById('main-content').style.display='block';
    document.getElementById('admin-entry-btn').style.display='none';
    renderAll();switchMode('preview');
  }else{document.getElementById('login-error').style.display='block';}
}
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){
  document.getElementById('admin-nav').style.display='none';
  document.getElementById('main-content').style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('public-only').style.display='block';
  document.getElementById('admin-entry-btn').style.display='block';
  document.getElementById('pw-input').value='';
  renderPublicInto('pub');
}
function showPublic(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('public-only').style.display='block';
  renderPublicInto('pub');
}

function switchL1(tab){
  document.querySelectorAll('#main-content .l1-tab').forEach((b,i)=>{
    b.classList.toggle('active',['pricelist','firstvisit','event'][i]===tab);
  });
  document.querySelectorAll('#main-content .l1-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}
function switchL2(tab){
  document.querySelectorAll('#l2-tabs .l2-tab').forEach((b,i)=>{
    b.classList.toggle('active',['scalp','inject','antiage','skin','hair'][i]===tab);
  });
  document.querySelectorAll('#panel-pricelist .l2-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('l2-'+tab).classList.add('active');
}
function switchL1pub(tab){
  document.querySelectorAll('#public-only .l1-tab').forEach((b,i)=>{
    b.classList.toggle('active',['pricelist','firstvisit','event'][i]===tab);
  });
  document.querySelectorAll('#public-only .l1-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('pub-'+tab).classList.add('active');
}
function switchL2pub(tab){
  document.querySelectorAll('#public-only .l2-tab').forEach((b,i)=>{
    b.classList.toggle('active',['scalp','inject','antiage','skin','hair'][i]===tab);
  });
  document.querySelectorAll('#pub-pricelist .l2-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('pub-l2-'+tab).classList.add('active');
}
function switchMode(mode){
  document.getElementById('btn-preview').classList.toggle('active',mode==='preview');
  document.getElementById('btn-edit').classList.toggle('active',mode==='edit');
  const showPreview=mode==='preview';
  ['panel-pricelist','panel-firstvisit','panel-event'].forEach(id=>{
    document.getElementById(id).style.display=showPreview?'':'none';
  });
  document.querySelector('#main-content .l1-tabs').style.display=showPreview?'flex':'none';
  document.getElementById('edit-view').style.display=showPreview?'none':'block';
  if(showPreview)renderAll();
  else renderEdit();
}

// ── RENDER ITEMS ──
function buildItemHTML(item){
  let h=`<div class="price-item">`;
  if(item.tag)h+=`<span class="item-tag">${esc(item.tag)}</span>`;
  h+=`<div class="item-name">${esc(item.name)}</div>`;
  if(item.note)h+=`<div class="item-note">${esc(item.note)}</div>`;
  h+=`<div class="item-rows">`;
  item.rows.forEach(r=>{
    h+=`<div class="item-row"><span class="row-label">${esc(r.label)}</span><span class="row-spec">${esc(r.spec)}</span><span class="row-price">${esc(r.price)}<span class="row-unit">${esc(r.unit)}</span></span></div>`;
  });
  h+=`</div></div>`;
  return h;
}

function renderPublicInto(prefix){
  const l2s=['scalp','inject','antiage','skin','hair'];
  l2s.forEach(l2=>{
    const el=document.getElementById(prefix+'-l2-'+l2)||document.getElementById('l2-'+l2);
    if(!el)return;
    el.innerHTML='';
    data.categories.filter(c=>c.type==='regular'&&c.l2===l2).forEach(cat=>{
      const sec=document.createElement('div');
      sec.className='section-block';
      sec.innerHTML=`<div class="block-header">${esc(cat.name)}</div>`+cat.items.map(buildItemHTML).join('');
      el.appendChild(sec);
    });
  });
  ['firstvisit','event'].forEach(type=>{
    const el=document.getElementById(prefix===''?'panel-'+type+'-content':prefix+'-'+type+'-content');
    if(!el)return;
    el.innerHTML='';
    data.categories.filter(c=>c.type===type).forEach(cat=>{
      cat.items.forEach(item=>{el.innerHTML+=buildItemHTML(item);});
    });
  });
  const upd=document.getElementById(prefix===''?'updated-note':'pub-updated-note');
  if(upd&&data.updatedAt)upd.textContent='更新时间：'+data.updatedAt;
}

function renderAll(){
  renderPublicInto('');
}

// ── EDIT ──
let nextId=9000;
function uid(){return 'n'+(++nextId);}
function renderEdit(){
  const c=document.getElementById('edit-categories');c.innerHTML='';
  data.categories.forEach(cat=>c.appendChild(buildCatEl(cat)));
}
function buildCatEl(cat){
  const wrap=document.createElement('div');wrap.className='admin-section';wrap.dataset.catId=cat.id;
  const typeLabel={'regular':'普通','firstvisit':'首次','event':'活动'};
  wrap.innerHTML=`<div class="admin-cat-header">
    <input class="admin-cat-name" value="${esc(cat.name)}" placeholder="分类名称"/>
    <span class="admin-l2-label">${typeLabel[cat.type]||cat.type} ${cat.l2||''}</span>
    <select class="cat-type-sel" onchange="updateCatMeta('${cat.id}','type',this.value)">
      <option value="regular"${cat.type==='regular'?' selected':''}>普通</option>
      <option value="firstvisit"${cat.type==='firstvisit'?' selected':''}>首次</option>
      <option value="event"${cat.type==='event'?' selected':''}>活动</option>
    </select>
    <select class="cat-type-sel" onchange="updateCatMeta('${cat.id}','l2',this.value)">
      <option value=""${!cat.l2?' selected':''}>—</option>
      <option value="scalp"${cat.l2==='scalp'?' selected':''}>头皮</option>
      <option value="inject"${cat.l2==='inject'?' selected':''}>注射</option>
      <option value="antiage"${cat.l2==='antiage'?' selected':''}>抗衰</option>
      <option value="skin"${cat.l2==='skin'?' selected':''}>皮肤</option>
      <option value="hair"${cat.l2==='hair'?' selected':''}>脱毛</option>
    </select>
    <button class="del-cat-btn" onclick="deleteCategory('${cat.id}')">✕</button>
  </div>
  <div data-items-for="${cat.id}"></div>
  <button class="add-item-btn" onclick="addItem('${cat.id}')">+ 添加项目</button>`;
  const iw=wrap.querySelector(`[data-items-for="${cat.id}"]`);
  cat.items.forEach(item=>iw.appendChild(buildItemEl(cat.id,item)));
  return wrap;
}
function buildItemEl(catId,item){
  const div=document.createElement('div');div.className='admin-item';div.dataset.itemId=item.id;
  div.innerHTML=`<div class="admin-item-top"><input class="admin-item-name" value="${esc(item.name)}" placeholder="项目名称"/><button class="del-item-btn" onclick="deleteItem('${catId}','${item.id}')">✕</button></div>
  <input class="admin-small-input" value="${esc(item.note)}" placeholder="备注说明"/>
  <div class="admin-tag-row"><span class="admin-tag-label">标签：</span><input class="admin-tag-input" value="${esc(item.tag)}" placeholder="标签"/></div>
  <div class="col-headers"><span>品牌/类型</span><span>规格</span><span>价格</span><span>单位</span></div>
  <div class="admin-price-rows" data-rows-for="${item.id}">${item.rows.map(r=>buildRowHtml(r)).join('')}</div>
  <button class="add-row-btn" onclick="addRow('${item.id}')">+ 添加价格行</button>`;
  return div;
}
function buildRowHtml(r){
  return `<div class="admin-price-row">
    <input class="admin-price-input inp-label" value="${esc(r.label)}" placeholder="品牌"/>
    <input class="admin-price-input inp-spec" value="${esc(r.spec)}" placeholder="规格"/>
    <input class="admin-price-input inp-price" value="${esc(r.price)}" placeholder="价格"/>
    <input class="admin-price-input inp-unit" value="${esc(r.unit)}" placeholder="单位"/>
    <button class="del-row-btn" onclick="this.closest('.admin-price-row').remove()">✕</button>
  </div>`;
}
function updateCatMeta(catId,field,val){
  const cat=data.categories.find(c=>c.id===catId);if(cat)cat[field]=val;
}
function collectEditValues(){
  document.querySelectorAll('[data-cat-id]').forEach(wrap=>{
    const cat=data.categories.find(c=>c.id===wrap.dataset.catId);if(!cat)return;
    const n=wrap.querySelector('.admin-cat-name');if(n)cat.name=n.value;
    cat.items.forEach(item=>{
      const el=wrap.querySelector(`[data-item-id="${item.id}"]`);if(!el)return;
      const ins=el.querySelectorAll('.admin-item-name,.admin-small-input,.admin-tag-input');
      if(ins[0])item.name=ins[0].value;if(ins[1])item.note=ins[1].value;if(ins[2])item.tag=ins[2].value;
      const rw=el.querySelector(`[data-rows-for="${item.id}"]`);
      if(rw){item.rows=[];rw.querySelectorAll('.admin-price-row').forEach(re=>{
        const ri=re.querySelectorAll('.admin-price-input');
        item.rows.push({label:ri[0].value,spec:ri[1].value,price:ri[2].value,unit:ri[3].value});
      });}
    });
  });
}
function addCategory(type,l2){
  const id=uid();data.categories.push({id,type,l2:l2||'',name:'新分类',items:[]});
  document.getElementById('edit-categories').appendChild(buildCatEl(data.categories[data.categories.length-1]));
}
function deleteCategory(catId){
  if(!confirm('确认删除？'))return;collectEditValues();
  data.categories=data.categories.filter(c=>c.id!==catId);renderEdit();
}
function addItem(catId){
  collectEditValues();const cat=data.categories.find(c=>c.id===catId);if(!cat)return;
  const id=uid();cat.items.push({id,name:'',note:'',tag:'',rows:[{label:'',spec:'',price:'',unit:'韩元'}]});
  const w=document.querySelector(`[data-items-for="${catId}"]`);
  if(w)w.appendChild(buildItemEl(catId,cat.items[cat.items.length-1]));
}
function deleteItem(catId,itemId){
  collectEditValues();const cat=data.categories.find(c=>c.id===catId);
  if(cat)cat.items=cat.items.filter(i=>i.id!==itemId);
  const el=document.querySelector(`[data-item-id="${itemId}"]`);if(el)el.remove();
}
function addRow(itemId){
  const w=document.querySelector(`[data-rows-for="${itemId}"]`);if(!w)return;
  const d=document.createElement('div');d.innerHTML=buildRowHtml({label:'',spec:'',price:'',unit:'韩元'});
  w.appendChild(d.firstElementChild);
}
// Init
try {
  renderPublicInto('pub');
  document.getElementById('public-only').style.display='block';
  // Hash routing
  function handleHash(){
    const hash = window.location.hash.replace('#','');
    if(hash==='admin'){
      document.getElementById('login-screen').style.display='flex';
      document.getElementById('public-only').style.display='none';
    } else if(hash==='event') switchL1pub('event');
    else if(hash==='firstvisit') switchL1pub('firstvisit');
    else switchL1pub('pricelist');
  }
  handleHash();
  window.addEventListener('hashchange', handleHash);
} catch(e) {
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('public-only').style.display='none';
}

// Banner
let bannerIdx=0;
const bannerTotal=3;
function goSlide(n){
  bannerIdx=n;
  document.getElementById('banner-track').style.transform=`translateX(-${n*100}%)`;
  document.querySelectorAll('.banner-dot').forEach((d,i)=>d.classList.toggle('active',i===n));
}
function nextSlide(){goSlide((bannerIdx+1)%bannerTotal);}
let bannerTimer=setInterval(nextSlide,3500);
let touchStartX=0;
document.getElementById('banner-track').addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
},{ passive:true });
document.getElementById('banner-track').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>40){
    dx<0?nextSlide():goSlide((bannerIdx-1+bannerTotal)%bannerTotal);
    clearInterval(bannerTimer);bannerTimer=setInterval(nextSlide,3500);
  }
},{ passive:true });

</script>
</body>
</html>
